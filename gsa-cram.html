<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="안전기사">
<meta name="theme-color" content="#0f1216">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%230f1216'/%3E%3Ctext x='90' y='118' font-size='96' text-anchor='middle' fill='%2339d98a' font-family='sans-serif' font-weight='bold'%3E安%3C/text%3E%3C/svg%3E">
<title>건설안전기사 실기 벼락치기</title>
<style>
:root{
  --bg:#0f1216; --panel:#171b21; --panel2:#1e242c; --line:#2a323c;
  --fg:#e8edf3; --dim:#8d99a8; --acc:#39d98a; --acc2:#2f9bff;
  --warn:#ff6b6b; --gold:#ffc94d;
  --r:14px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;height:100%}
body{
  background:var(--bg); color:var(--fg);
  font-family:-apple-system,BlinkMacSystemFont,"Pretendard","Apple SD Gothic Neo","Malgun Gothic","맑은 고딕","Segoe UI",sans-serif;
  font-size:16px; line-height:1.6; overscroll-behavior:none;
  -webkit-text-size-adjust:100%; text-size-adjust:100%;
}
button{font-family:inherit; font-size:inherit; color:inherit; background:none; border:none; cursor:pointer}
/* iOS Safari: 주소창 때문에 100vh 가 잘리므로 dvh 우선 (미지원 시 vh 로 폴백) */
#app{display:flex; flex-direction:column; height:100vh; height:100dvh; max-width:820px; margin:0 auto}

/* ── 헤더 ── */
header{flex:0 0 auto; padding:10px 14px 0; background:var(--bg)}
.hrow{display:flex; align-items:center; gap:10px}
.title{font-size:14px; font-weight:700; letter-spacing:-.3px; color:var(--dim); white-space:nowrap}
.title b{color:var(--acc)}
.spacer{flex:1}
.iconbtn{width:36px;height:36px;border-radius:10px;background:var(--panel);display:flex;align-items:center;justify-content:center;font-size:16px}
.iconbtn.on{background:var(--acc);color:#08130c}
.bar{height:5px;background:var(--panel);border-radius:3px;margin:9px 0 8px;overflow:hidden}
.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--acc2),var(--acc));width:0;transition:width .25s}
.counts{display:flex;gap:12px;font-size:12px;color:var(--dim);margin-bottom:8px;align-items:center}
.counts b{color:var(--fg)}
.pill{padding:2px 8px;border-radius:20px;background:var(--panel);font-size:11px}

/* ── 카드 ── */
main{flex:1 1 auto; overflow-y:auto; padding:0 14px 14px; -webkit-overflow-scrolling:touch}
.card{background:var(--panel); border:1px solid var(--line); border-radius:var(--r); padding:16px}
.meta{display:flex; flex-wrap:wrap; gap:6px; align-items:center; margin-bottom:10px}
.tag{font-size:11px; font-weight:700; padding:3px 8px; border-radius:6px; background:var(--panel2); color:var(--dim)}
.tag.src{background:#1c3a5e; color:#8fc7ff}
.tag.src.j{background:#3d2a4d; color:#d8a9ff}
.tag.pt{background:#3a3320; color:var(--gold)}
.tag.need{background:#123040; color:#7fd4ff}
.more{
  display:block; width:100%; margin-top:4px; padding:10px; border-radius:10px;
  background:transparent; border:1px dashed var(--line); color:var(--dim); font-size:13px;
}
.more:active{background:var(--panel2)}
.ans.rest{margin-top:8px; opacity:.72}
.ans.rest li{background:#191d24; font-size:14.5px}
.stars{color:var(--gold); font-size:12px; letter-spacing:1px}
.law{font-size:12.5px; color:var(--acc2); margin-bottom:12px; word-break:keep-all}
.years{font-size:11.5px; color:var(--dim); margin-bottom:12px; word-break:break-all}
.q{font-size:16.5px; word-break:keep-all; margin-bottom:4px}
.q p{margin:0 0 8px}
.q p:last-child{margin-bottom:0}
hr.sep{border:none;border-top:1px dashed var(--line); margin:14px 0}
.alabel{font-size:11px;color:var(--dim);letter-spacing:1px;margin-bottom:8px}
.ans{list-style:none;padding:0;margin:0}
.ans li{
  background:var(--panel2); border-radius:10px; padding:10px 12px; margin-bottom:7px;
  word-break:keep-all; font-size:15.5px; position:relative; transition:background .15s;
}
.ans li.hide{color:transparent; cursor:pointer; user-select:none; min-height:42px}
.ans li.hide::after{
  content:"눌러서 확인"; position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  color:var(--dim); font-size:12.5px; letter-spacing:.5px;
}
.ans li.show{border-left:3px solid var(--acc); animation:pop .18s ease-out}
@keyframes pop{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.blank{
  display:inline-block; border-radius:5px; padding:0 4px; margin:0 1px;
  background:#39424f; color:transparent; cursor:pointer;
  border-bottom:2px solid var(--gold); border-radius:5px 5px 2px 2px;
}
.blank.open{background:rgba(255,201,77,.15); color:var(--gold); font-weight:700; cursor:default}
.sheetbox .hint b{color:var(--gold)}
.pageimg{width:100%; border-radius:10px; margin-top:8px; background:#fff; display:block}
.imgnote{font-size:11.5px;color:var(--dim);margin:10px 0 2px}
.done{text-align:center;padding:40px 16px}
.done h2{font-size:20px;margin:0 0 6px}
.done p{color:var(--dim);margin:0 0 20px;font-size:14px}

/* ── 하단 조작 ── */
footer{flex:0 0 auto; padding:8px 14px calc(10px + env(safe-area-inset-bottom)); background:var(--bg); border-top:1px solid var(--line)}
.row{display:flex; gap:8px}
.row+.row{margin-top:8px}
.btn{flex:1; padding:13px 8px; border-radius:12px; background:var(--panel); font-weight:700; font-size:14.5px; text-align:center; transition:transform .08s}
.btn:active{transform:scale(.97)}
.btn.main{background:var(--acc); color:#08130c; flex:2}
.btn.no{background:#3a2226; color:#ff9a9a}
.btn.yes{background:#1f3a2c; color:#7ee2ae}
.btn.no.on{background:var(--warn);color:#2a0d10}
.btn.yes.on{background:var(--acc);color:#08130c}
.btn.ghost{background:var(--panel); color:var(--dim); flex:.7; font-size:13px}
.btn[disabled]{opacity:.35}

/* ── 설정 패널 ── */
.sheet{position:fixed; inset:0; background:rgba(0,0,0,.6); display:none; z-index:20; align-items:flex-end; justify-content:center}
.sheet.open{display:flex}
.sheetbox{background:var(--panel); width:100%; max-width:820px; max-height:88dvh; overflow-y:auto;
  border-radius:18px 18px 0 0; padding:18px 16px calc(20px + env(safe-area-inset-bottom))}
.sheetbox h3{margin:0 0 14px; font-size:16px}
.grp{margin-bottom:16px}
.grp>label{display:block; font-size:12px; color:var(--dim); margin-bottom:7px; letter-spacing:.5px}
.opts{display:flex; flex-wrap:wrap; gap:7px}
.opt{padding:9px 13px; border-radius:10px; background:var(--panel2); font-size:13.5px; border:1px solid transparent}
.opt.sel{background:var(--acc); color:#08130c; font-weight:700}
input[type=text]{width:100%; padding:11px 12px; border-radius:10px; background:var(--panel2);
  border:1px solid var(--line); color:var(--fg); font-size:14px; outline:none}
input[type=text]:focus{border-color:var(--acc)}
input[type=range]{width:100%; accent-color:var(--acc)}
.hint{font-size:11.5px;color:var(--dim);margin-top:7px;line-height:1.55}
.kbd{display:inline-block;background:var(--panel2);border:1px solid var(--line);border-radius:5px;padding:0 5px;font-size:11px;color:var(--dim)}
.zoom{position:fixed;inset:0;background:rgba(0,0,0,.92);display:none;z-index:30;overflow:auto;padding:10px}
.zoom.open{display:block}
.zoom img{width:100%;max-width:1100px;margin:0 auto;display:block;border-radius:6px}
@media (min-width:700px){ .q{font-size:17.5px} .ans li{font-size:16.5px} }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="hrow">
      <div class="title">건설안전기사 실기 <b>벼락치기</b></div>
      <div class="spacer"></div>
      <button class="iconbtn" id="autoBtn" title="자동재생 (A)">▶</button>
      <button class="iconbtn" id="setBtn" title="설정">⚙</button>
    </div>
    <div class="bar"><i id="prog"></i></div>
    <div class="counts">
      <span id="pos">0 / 0</span>
      <span class="pill" id="deckInfo">전체</span>
      <div class="spacer"></div>
      <span>몰라 <b id="cNo" style="color:#ff9a9a">0</b></span>
      <span>알아 <b id="cYes" style="color:#7ee2ae">0</b></span>
    </div>
  </header>

  <main id="main"></main>

  <footer>
    <div class="row">
      <button class="btn ghost" id="prevBtn">‹ 이전</button>
      <button class="btn main" id="revealBtn">답 보기</button>
      <button class="btn ghost" id="nextBtn">다음 ›</button>
    </div>
    <div class="row">
      <button class="btn no" id="noBtn">✕ 몰라</button>
      <button class="btn yes" id="yesBtn">○ 알아</button>
    </div>
  </footer>
</div>

<div class="sheet" id="sheet">
  <div class="sheetbox">
    <h3>학습 설정</h3>
    <div class="grp">
      <label>빠른 시작</label>
      <div class="opts">
        <button class="opt preset" id="p60" style="background:var(--acc);color:#08130c;font-weight:700">⚡ 60점 벼락치기</button>
        <button class="opt preset" id="pAll">전체 정독</button>
      </div>
      <p class="hint" style="margin-top:6px">60점 벼락치기 = 빈출 <b>★★★ 이상</b> + <b>요점만</b> + <b>시험에 적을 답만</b> 빈칸. 하룻밤에 도는 걸 목표로 한 조합입니다.</p>
    </div>
    <div class="grp">
      <label>답안 분량</label>
      <div class="opts" data-k="full">
        <button class="opt" data-v="n">요점만 (외울 것 3~5개)</button>
        <button class="opt" data-v="y">교재 전체</button>
      </div>
    </div>
    <div class="grp">
      <label>범위</label>
      <div class="opts" data-k="src">
        <button class="opt" data-v="all">전체</button>
        <button class="opt" data-v="필답형">필답형</button>
        <button class="opt" data-v="작업형">작업형</button>
      </div>
    </div>
    <div class="grp">
      <label>출제빈도 (별이 많을수록 자주 나옴)</label>
      <div class="opts" data-k="star">
        <button class="opt" data-v="1">전부</button>
        <button class="opt" data-v="2">★★ 이상</button>
        <button class="opt" data-v="3">★★★ 이상</button>
        <button class="opt" data-v="4">★★★★ 이상</button>
      </div>
    </div>
    <div class="grp">
      <label>순서</label>
      <div class="opts" data-k="sort">
        <button class="opt" data-v="freq">빈출순 (추천)</button>
        <button class="opt" data-v="book">교재순</button>
        <button class="opt" data-v="rand">랜덤</button>
      </div>
    </div>
    <div class="grp">
      <label>보기 방식</label>
      <div class="opts" data-k="mode">
        <button class="opt" data-v="blank">적을 답만 빈칸</button>
        <button class="opt" data-v="step">한 줄씩 공개</button>
        <button class="opt" data-v="open">바로 다 보기</button>
      </div>
      <p class="hint">「쓰시오」는 답 한 줄을 통째로 가리고, 「채우시오」는 숫자·핵심값만 빈칸으로 둡니다.</p>
    </div>
    <div class="grp">
      <label>필터</label>
      <div class="opts" data-k="only">
        <button class="opt" data-v="all">전부</button>
        <button class="opt" data-v="no">✕ 몰라 표시만</button>
        <button class="opt" data-v="new">아직 안 본 것만</button>
      </div>
    </div>
    <div class="grp">
      <label>분류</label>
      <div class="opts" id="catOpts" data-k="cat"></div>
    </div>
    <div class="grp">
      <label>검색 (키워드)</label>
      <input type="text" id="q" placeholder="예: 비계, 안전난간, 사다리">
    </div>
    <div class="grp">
      <label>자동재생 간격 — <b id="spdV">3.0</b>초</label>
      <input type="range" id="spd" min="10" max="120" step="5" value="30">
    </div>
    <div class="row" style="margin-bottom:10px">
      <button class="btn main" id="applyBtn">적용하고 시작</button>
    </div>
    <div class="row">
      <button class="btn ghost" id="resetBtn">진도·표시 초기화</button>
    </div>
    <p class="hint">
      단축키 — <span class="kbd">Space</span> 답 공개/다음 · <span class="kbd">←</span> <span class="kbd">→</span> 이동 ·
      <span class="kbd">1</span> 몰라 · <span class="kbd">2</span> 알아 · <span class="kbd">A</span> 자동재생 · <span class="kbd">F</span> 전부 공개<br>
      휴대폰에서는 카드를 좌우로 밀어서 넘길 수 있습니다. 진도는 자동 저장됩니다.
    </p>
  </div>
</div>

<div class="zoom" id="zoom"><img id="zoomImg" alt=""></div>

업 중 발생된 위험요인","cat":"기타·개념","q":["1. 건물 외벽에 석재를 붙이고 있는 작업 중 재해가 발생하였다. 동영상을 참고하여, 작업 중 위험요인을 3가지 쓰시오."],"a":["작업자는 비계 위에서 휴대용 연삭기로 석재를 자르고 있다. 안전대를 착용하지 않았으며, 분진이 발생하는데 방진마스크도 착용하지 않았다. 작업자는 크기가 큰 석재를 덮개가 없는 휴대용 연삭기를 사용하여 절단하고 있다. 안전난간도 없고, 작업발판도 부실한 작업장의 모습을 보여주고 있다. 또 다른 작업자는 안전모도 착용하지 않은 채 작업하고 있다.","① 작업자가 안전모 및 안전대를 착용하고 있지 않다.","② 안전난간을 설치하지 않았다.","③ 작업발판이 부실하다.","④ 연삭기에 회전날 접촉방지 커버를 부착하지 않았다."],"ac":["작업자는 비계 위에서 휴대용 연삭기로 석재를 자르고 있다. 안전대를 착용하지 않았으며, 분진이 〖발생하는데 방진마스크도 착용하지〗 않았다. 작업자는 크기가 큰 석재를 덮개가 없는 휴대용 연삭기를 사용하여 절단하고 있다. 안전난간도 없고, 〖작업발판도 부실한 작업장〗의 모습을 보여주고 있다. 또 다른 작업자는 〖안전모도 착용하지 않은〗 채 작업하고 있다.","① 작업자가 〖안전모〗 및 안전대를 착용하고 〖있지 않다〗.","② 안전난간을 〖설치하지〗 않았다.","③ 작업발판이 〖부실하다〗.","④ 연삭기에 〖회전날 접촉방지 커버를 부착하지〗 않았다."],"keep":[0,1,2,3,4],"need":3},{"id":"작업형-114-2","no":"114","src":"작업형","y":["2025.3B","2024.1B","2022.4C","2021.4C","2020.2D","2019.1B","2018.2C"],"pt":6,"law":"작업 중 발생된 위험요인","cat":"기타·개념","q":["2. 건물 외벽에 석재를 붙이고 있는 작업 중 재해가 발생하였다. 동영상을 참고하여, 작업 중 위험요인을 3가지 쓰시오."],"a":["작업자는 건물 외벽에 석재로 붙이는 공사 현장을 보여주고 있다. 안전난간도 없고, 작업발판도 부실하고, 정돈되지 않은 작업장의 모습을 보여주고 있다. 바닥에서 2m 넘는 곳에서 위쪽의 작업자는 구두를 신고 목장갑을 착용한 채로 휴대용 연삭기를 사용해 석재를 자르고 있다. 안전모를 착용하지 않은 다른 작업자는 아래쪽에서 작업하고 있다. 아래쪽 작업자가 돌을 들어 올리는 순간 허리를 삐끗한다.","① 작업자가 안전모 및 안전대를 착용하고 있지 않다.","② 안전난간을 설치하지 않았다.","③ 작업발판을 설치하지 않았다."],"ac":["작업자는 건물 외벽에 석재로 붙이는 공사 현장을 보여주고 있다. 안전난간도 없고, 작업발판도 부실하고, 정돈되지 않은 작업장의 모습을 보여주고 있다. 바닥에서 〖2m〗 〖넘는 곳에서 위쪽의 작업자〗는 〖구두를 신고 목장갑을 착용한〗 채로 휴대용 연삭기를 사용해 석재를 자르고 있다. 안전모를 착용하지 않은 다른 작업자는 아래쪽에서 작업하고 있다. 아래쪽 작업자가 〖돌을 들어 올리는 순간〗 허리를 삐끗한다.","① 작업자가 〖안전모〗 및 안전대를 착용하고 〖있지 않다〗.","② 안전난간을 〖설치하지〗 않았다.","③ 작업발판을 〖설치하지〗 않았다."],"keep":[0,1,2,3],"need":3},{"id":"작업형-115-1","no":"115","src":"작업형","y":["2022.2A","2020.2A"],"pt":4,"law":"작업 중 발생된 위험요인","cat":"기타·개념","q":["동영상을 참고하여 위험요인을 2가지 쓰시오. (단, 영상에서 제시된 안전방망, 방호선반, 안전난간 등의 설치는 제외한다.) 아파트 건설현장에서 작업자가 거푸집 동바리 설치 중 거푸집이 낙하하여 작업자가 추락하는 모습을 보여주고 있다. 작업자들은 안전대와 안전모를 착용하고 있지 않은 모습이며 안전난간과 작업발판 또한 설치되지 않았다."],"a":["① 작업발판을 설치하지 않았다.","② 작업자가 안전모를 착용하고 있지 않다.","③ 작업자가 안전대를 {"id":"작업형-119-1","no":"119","src":"작업형","y":["2021.1A","2020.2E","2019.1A"],"pt":6,"law":"작업 중 발생된 위험요인","cat":"기타·개념","q":["동영상에는 근로자가 손수레에 모래를 가득 싣고 리프트를 타고 올라가는 도중 사고가 발생하는 모습을 보여주고 있다. 작업 장소는 리프트 설치 장소이고, 리프트의 개구부에 안전난간이 해체된 상태이다. 작업자가 손수레를 놓고 뒷걸음질 치다 뒤로 추락하였다. 영상을 보고 다음 물음에 답하시오.","가) 리프트의 안전장치를 2가지 쓰시오.","나) 재해발생형태를 쓰시오.","다) 재해 발생원인을 2가지 쓰시오.","라) 해당 작업장에서 위험요인에 대한 안전대책을 3가지 쓰시오."],"a":["가) 리프트의 안전장치:","① 과부하방지장치","② 권과방지장치","③ 비상정지장치","나) 재해발생형태: 추락(떨어짐)","다) 재해 발생원인:","① 안전난간을 설치하지 않았다.","② 적재물의 무게가 운반 장비의 운전 한계를 초과하였다.","라) 안전대책:","① 안전대를 착용한다.","② 모래를 적재하중으로 싣도록 한다.","③ 안전난간을 설치한다."],"ac":["가) 리프트의 〖안전장치〗:","① 〖과부하방지장치〗","② 〖권과방지장치〗","③ 〖비상정지장치〗","나) 〖재해발생형태〗: 추락(떨어짐)","다) 〖재해 발생원인〗:","① 안전난간을 〖설치하지〗 않았다.","② 〖적재물의 무게가 운반 장비〗의 운전 한계를 초과하였다.","라) 〖안전대책〗:","① 〖안전대〗를 착용한다.","② 모래를 〖적재하중으로 싣도록〗 한다.","③ 〖안전난간〗을 설치한다."],"keep":[0,1,2,3,4,5,6,8],"need":3},{"id":"작업형-120-1","no":"120","src":"작업형","y":["2022.1C·2B","2020.3E"],"pt":6,"law":"철근공사 작업 중 발생된 위험요인","cat":"기타·개념","q":["동영상에는 작업자가 안전발판 없이 철근공사를 하고 있는 모습을 보여주고 있다. 철근을 밟고 이동하는 작업자는 안전대와 안전화를 착용하지 않았다. 화면 상의 해당 작업장 및 작업자가 안전기준을 위반한 사항을 3가지 쓰시오."],"a":["① 안전발판 미설치","② 개인보호구 미착용","③ 안전통로 미설치"],"ac":["① 〖안전발판 미설치〗","② 〖개인보호구 미착용〗","③ 〖안전통로 미설치〗"],"keep":[0,1,2],"need":3},{"id":"작업형-121-1","no":"121","src":"작업형","y":["2021.2B"],"pt":6,"law":"크레인 인양 작업 시 불안전한 요소","cat":"기타·개념","q":["동영상에는 해체한 타워크레인을 화물차 트럭의 적재함에 적재하고 있는 모습을 보여주고 있다. 영상을 보고 크레인 인양 작업 시 불안전한 요소를 3가지 쓰시오."],"a":["트럭의 적재함에 작업자가 올라와서 손으로 인양물을 밀고 있다. 작업자는 안전모를 착용하지 않았고, 인양물을 적재하는 도중 부딪칠 뻔한다. 별도의 신호수도 보이지 않고, 중량물 인양 시 다른 작업자들이 인양물 아래를 지나가고 있다.","① 작업자가 안전모를 착용하고 있지 않다.","② 신호수가 배치되지 않았다.","③ 작업반경 내 작업자의 출입을 금지하지 않았다."],"ac":["트럭의 적재함에 작업자가 〖올라와서 손으로 인양물〗을 밀고 있다. 작업자는 안전모를 착용하지 않았고, 인양물을 적재하는 도중 부딪칠 뻔한다. 〖별도의 신호수도 보이지 않고〗, 중량물 인양 시 〖다른 작업자들이 인양물 아래를〗 지나가고 있다.","① 작업자가 안전모를 착용하고 〖있지 않다〗.","② 신호수가 〖배치되지〗 않았다.","③ 〖작업반경〗 내 작업자의 출입을 〖금지하지〗 않았다."],"keep":[0,1,2,3],"need":3},{"id":"작업형-122-1","no":"122","src":"작업형","y":["2020.3C·4C","2019.2B"],"pt":6,"law":"감 const CARDS = DATA.cards, IMGS = DATA.imgs;

/* ── 저장 ── */
const LSK = 'gsa_cram_v2';
let store = {mark:{}, seen:{}, idx:0,
  cfg:{src:'all',star:'3',sort:'freq',mode:'blank',only:'all',cat:'all',q:'',spd:30,full:'n'}};
try{
  const s = JSON.parse(localStorage.getItem(LSK) || localStorage.getItem('gsa_cram_v1'));
  if(s){
    store = Object.assign(store, s);
    store.cfg = Object.assign({src:'all',star:'3',sort:'freq',mode:'blank',only:'all',cat:'all',q:'',spd:30,full:'n'}, s.cfg || {});
    store.cfg.mode = store.cfg.mode || 'blank';
  }
}catch(e){}
const save = () => { try{ localStorage.setItem(LSK, JSON.stringify(store)); }catch(e){} };

/* ── 별점 = 출제 횟수 ── */
const starOf = c => { const n=c.y.length; return n>=7?5:n>=5?4:n>=3?3:n>=2?2:1; };
CARDS.forEach(c => { c.st = starOf(c); c.txt = (c.q.join(' ')+' '+c.a.join(' ')+' '+c.law).toLowerCase(); });

/* ── 덱 구성 ── */
let deck = [], pos = 0;
function buildDeck(keepId){
  const g = store.cfg;
  const kw = (g.q||'').trim().toLowerCase();
  deck = CARDS.filter(c => {
    if(g.src !== 'all' && c.src !== g.src) return false;
    if(c.st < +g.star) return false;
    if(g.cat !== 'all' && c.cat !== g.cat) return false;
    if(g.only === 'no' && store.mark[c.id] !== 'no') return false;
    if(g.only === 'new' && store.seen[c.id]) return false;
    if(kw && !c.txt.includes(kw)) return false;
    return true;
  });
  if(g.sort === 'freq') deck.sort((a,b) => b.st - a.st || b.y.length - a.y.length || a.id.localeCompare(b.id));
  else if(g.sort === 'rand') deck.sort(() => Math.random() - .5);
  pos = 0;
  if(keepId){ const i = deck.findIndex(c => c.id === keepId); if(i >= 0) pos = i; }
  else if(store.idx && store.idx < deck.length) pos = store.idx;
}

/* ── 빈칸 처리 ── */
const esc = s => s.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));

/* 질문 유형: 쓰시오(답 통째로 적음) vs 채우시오(괄호 값만 적음) */
function qText(c){ return (c.q || []).join(' '); }
function isWriteCard(c){
  const q = qText(c);
  return !!(c.need) || /쓰시오|기술하시오|설명하시오|서술하시오|기입하시오|열거|나열|적어|작성하시오/.test(q);
}
function isFillCard(c){
  const q = qText(c);
  return /채우시오|\(\s*\)|\( \)|괄호/.test(q);
}

/* 시험 괄호에 실제로 적을 값만 빈칸: 숫자·단위 우선, 짧은 핵심 명사 */
function keepBlankTerm(term){
  const t = String(term || '').trim();
  if(!t) return false;
  if(/\d/.test(t)) return true;                 // 90cm, 2m, 70% …
  if(/[㎡％%]/.test(t) && t.length <= 6) return true;
  if(t.length < 2 || t.length > 8) return false;
  if(/\s/.test(t)) return false;               // 여러 단어 구는 괄호 답이 아님
  // 조사·용언 조각 제외
  if(/[은는을를이가의과와도만]$/.test(t)) return false;
  if(/(으로|로|로부터|으로부터|에서의|하여|하도록|도록|거나|되지|되는|있는|없는|이다|있다|한다|할것|하면|되면|으면|어야|이을|일)$/.test(t)) return false;
  if(/(지|어|여|게|니|며)$/.test(t) && t.length <= 5) return false; // 꼬인, 걸어야 등
  if(/^(그|및|또는|등|경우|때|후|전|간격|폭|경사|계단|바닥면|추락|당일|체결|수평|사업주|공정율|현상파악|본질추구|대책수립|목표설정|재료일|호의)$/.test(t)) return false;
  return true;                                  // 발끝막이판, 안전난간, 경암, 난간기둥 …
}

function blankify(s){
  return String(s || '').split(/〖|〗/).map((part, i) => {
    if(i % 2 === 0) return esc(part);
    if(!keepBlankTerm(part)) return esc(part); // 과한 표시는 일반 텍스트로
    return `<span class="blank" data-t="${esc(part)}">${esc(part)}</span>`;
  }).join('');
}
function usefulBlankCount(c){
  let n = 0;
  for(const t of (c.ac || [])){
    const parts = String(t || '').split(/〖|〗/);
    for(let i = 1; i < parts.length; i += 2){
      if(keepBlankTerm(parts[i])) n++;
    }
  }
  return n;
}
const hasBlank = c => usefulBlankCount(c) > 0;

/* 60점 전략: '요점만' 이면 외울 가치 높은 항목만, '전체' 면 교재 그대로 */
function shownIdx(c){
  if(store.cfg.full === 'y' || !c.keep) return c.a.map((_, i) => i);
  return c.keep;
}

/*
 * blank 모드 동작:
 * - 쓰시오형: 시험에 적을 답(한 줄) 전체를 가림
 * - 채우시오형: 괄호에 들어갈 숫자·핵심값만 빈칸
 * - 그 외/빈칸 없으면 한 줄씩 공개
 */
function effMode(c){
  const m = store.cfg.mode;
  if(m !== 'blank') return m;
  if(isWriteCard(c)) return 'step';          // 답 통째로 가리기
  if(isFillCard(c) && hasBlank(c)) return 'blank';
  if(hasBlank(c)) return 'blank';
  return 'step';
}

/* ── 렌더 ── */
const $ = id => document.getElementById(id);
const main = $('main');
let revealed = 0;

function render(){
  if(!deck.length){
    main.innerHTML = `<div class="done"><h2>해당 조건의 문제가 없어요</h2><p>설정(⚙)에서 범위나 필터를 넓혀보세요.</p></div>`;
    $('pos').textContent = '0 / 0'; $('prog').style.width = '0';
    return;
  }
  if(pos >= deck.length){
    const no = deck.filter(c => store.mark[c.id] === 'no').length;
    main.innerHTML = `<div class="done"><h2>🎉 이 덱 한 바퀴 완료!</h2>
      <p>총 ${deck.length}문제 중 <b style="color:#ff9a9a">몰라 ${no}개</b></p>
      <div class="row"><button class="btn main" onclick="restartNo()">✕ 몰라 표시만 다시 돌기</button></div>
      <div class="row"><button class="btn" onclick="restartAll()">처음부터 다시</button></div></div>`;
    $('pos').textContent = `${deck.length} / ${deck.length}`;
    $('prog').style.width = '100%';
    return;
  }
  const c = deck[pos];
  store.seen[c.id] = 1; store.idx = pos; save();
  const mode = effMode(c);
  revealed = 0;

  const stars = '★'.repeat(c.st) + '☆'.repeat(5 - c.st);
  const qhtml = c.q.map(t => `<p>${esc(t)}</p>`).join('');
  const mk = store.mark[c.id];

  let ahtml = '';
  if(!c.a.length){
    ahtml = `<div class="imgnote">⚠ 이 문항은 교재에 정답이 따로 적혀 있지 않습니다. 아래 원본 페이지를 확인하세요.</div>`;
  }
  if(c.img){
    ahtml += `<div class="imgnote">▸ 계산·표·그림 문제는 교재 원본 페이지로 보여드려요 (탭하면 확대)</div>` +
      c.img.map(k => `<img class="pageimg" src="${IMGS[k]}" data-k="${k}" alt="교재 페이지" loading="lazy" decoding="async">`).join('');
  } else {
    const idx = shownIdx(c);
    const li = i => {
      const t = c.a[i];
      if(mode === 'step') return `<li class="hide" data-i="${i}">${esc(t)}</li>`;
      if(mode === 'blank'){
        const src = c.ac[i] || t;
        const html = blankify(src);
        // 이 줄에 남길 빈칸이 없으면 답 전체를 가림 (적을 내용 자체)
        if(!html.includes('class="blank"')){
          return `<li class="hide" data-i="${i}">${esc(t)}</li>`;
        }
        return `<li class="show">${html}</li>`;
      }
      return `<li class="show">${esc(t)}</li>`;
    };
    ahtml += `<ul class="ans">` + idx.map(li).join('') + `</ul>`;
    const restN = c.a.length - idx.length;
    if(restN > 0){
      ahtml += `<button class="more" id="moreBtn">＋ 교재의 나머지 ${restN}개 보기</button>`;
      ahtml += `<ul class="ans rest" id="restList" hidden>` +
        c.a.map((t, i) => i).filter(i => !idx.includes(i)).map(li).join('') + `</ul>`;
    }
  }

  main.innerHTML = `<div class="card">
    <div class="meta">
      <span class="tag src ${c.src === '작업형' ? 'j' : ''}">${c.src} #${c.no}</span>
      <span class="stars" title="출제 ${c.y.length}회">${stars}</span>
      ${c.pt ? `<span class="tag pt">${c.pt}점</span>` : ''}
      ${c.need ? `<span class="tag need">✍ ${c.need}가지 쓰기</span>` : ''}
      ${mk === 'no' ? '<span class="tag" style="background:#3a2226;color:#ff9a9a">✕ 몰라</span>' : ''}
      ${mk === 'yes' ? '<span class="tag" style="background:#1f3a2c;color:#7ee2ae">○ 알아</span>' : ''}
    </div>
    <div class="law">📘 ${esc(c.law || '-')}</div>
    <div class="years">출제 ${c.y.length}회 · ${esc(c.y.join(' · ')) || '-'}</div>
    <div class="q">${qhtml}</div>
    <hr class="sep">
    <div class="alabel">정답</div>
    ${ahtml}
  </div>`;
  main.scrollTop = 0;

  $('pos').textContent = `${pos + 1} / ${deck.length}`;
  $('prog').style.width = ((pos + 1) / deck.length * 100) + '%';
  $('deckInfo').textContent = (store.cfg.src === 'all' ? '전체' : store.cfg.src)
    + (store.cfg.full === 'y' ? '' : ' · 요점만') + (+store.cfg.star > 1 ? ' · ★' + store.cfg.star + '+' : '');
  $('noBtn').classList.toggle('on', mk === 'no');
  $('yesBtn').classList.toggle('on', mk === 'yes');
  $('prevBtn').disabled = pos === 0;
  updateReveal();
  updateCounts();
}

function updateReveal(){
  const c = deck[pos]; if(!c) return;
  const b = $('revealBtn');
  const m = effMode(c);
  if(c.img || m === 'open'){ b.textContent = '다음 문제 ›'; return; }
  if(m === 'blank'){
    const left = main.querySelectorAll('.ans:not([hidden]) .blank:not(.open)').length;
    b.textContent = left ? `빈칸 채우기 (${left})` : '다음 문제 ›';
    return;
  }
  const tot = main.querySelectorAll('.ans:not([hidden]) li').length;
  const left = main.querySelectorAll('.ans:not([hidden]) li.hide').length;
  b.textContent = left ? `답 보기 (${tot - left}/${tot})` : '다음 문제 ›';
}
function updateCounts(){
  let n = 0, y = 0;
  for(const k in store.mark){ store.mark[k] === 'no' ? n++ : y++; }
  $('cNo').textContent = n; $('cYes').textContent = y;
}

/* ── 진행 ── */
function step(){
  const c = deck[pos];
  if(!c){ return; }
  const m = effMode(c);
  if(c.img || m === 'open'){ next(); return; }
  if(m === 'blank'){
    const b = main.querySelector('.ans:not([hidden]) .blank:not(.open)');
    if(b){ openBlank(b); updateReveal(); } else next();
    return;
  }
  const li = main.querySelector('.ans:not(.rest) li.hide') || main.querySelector('.ans li.hide');
  if(li){ li.classList.remove('hide'); li.classList.add('show'); revealed++; updateReveal();
    li.scrollIntoView({block:'nearest', behavior:'smooth'}); }
  else next();
}
function revealAll(){
  main.querySelectorAll('.ans li.hide').forEach(li => { li.classList.remove('hide'); li.classList.add('show'); });
  main.querySelectorAll('.blank:not(.open)').forEach(openBlank);
  updateReveal();
}
function openBlank(b){ b.classList.add('open'); b.textContent = b.dataset.t; }
function next(){ pos++; render(); }
function prev(){ if(pos > 0){ pos--; render(); } }
function mark(v){
  const c = deck[pos]; if(!c) return;
  store.mark[c.id] = (store.mark[c.id] === v) ? undefined : v;
  if(!store.mark[c.id]) delete store.mark[c.id];
  save(); updateCounts();
  $('noBtn').classList.toggle('on', store.mark[c.id] === 'no');
  $('yesBtn').classList.toggle('on', store.mark[c.id] === 'yes');
  setTimeout(next, 120);
}
window.restartNo = () => { store.cfg.only = 'no'; syncOpts(); buildDeck(); render(); };
window.restartAll = () => { pos = 0; store.idx = 0; render(); };

/* ── 자동재생 ── */
let timer = null;
function toggleAuto(){
  if(timer){ clearInterval(timer); timer = null; }
  else {
    const ms = (+store.cfg.spd / 10) * 1000;
    timer = setInterval(() => {
      if(pos >= deck.length){ toggleAuto(); return; }
      step();
    }, ms);
  }
  $('autoBtn').textContent = timer ? '❚❚' : '▶';
  $('autoBtn').classList.toggle('on', !!timer);
}

/* ── 이벤트 ── */
$('revealBtn').onclick = step;
$('nextBtn').onclick = next;
$('prevBtn').onclick = prev;
$('noBtn').onclick = () => mark('no');
$('yesBtn').onclick = () => mark('yes');
$('autoBtn').onclick = toggleAuto;

main.addEventListener('click', e => {
  const mb = e.target.closest('#moreBtn');
  if(mb){
    const rest = $('restList');
    rest.hidden = !rest.hidden;
    mb.textContent = rest.hidden
      ? `＋ 교재의 나머지 ${rest.children.length}개 보기`
      : `− 나머지 접기 (시험엔 위의 것만 써도 충분)`;
    updateReveal();
    return;
  }
  const li = e.target.closest('.ans li.hide');
  if(li){ li.classList.remove('hide'); li.classList.add('show'); revealed++; updateReveal(); return; }
  const b = e.target.closest('.blank:not(.open)');
  if(b){ openBlank(b); updateReveal(); return; }
  const im = e.target.closest('.pageimg');
  if(im){ $('zoomImg').src = im.src; $('zoom').classList.add('open'); }
});
$('zoom').onclick = () => $('zoom').classList.remove('open');

document.addEventListener('keydown', e => {
  if($('sheet').classList.contains('open')){ if(e.key === 'Escape') closeSheet(); return; }
  const k = e.key.toLowerCase();
  if(e.code === 'Space'){ e.preventDefault(); step(); }
  else if(e.key === 'ArrowRight') next();
  else if(e.key === 'ArrowLeft') prev();
  else if(k === '1') mark('no');
  else if(k === '2') mark('yes');
  else if(k === 'a') toggleAuto();
  else if(k === 'f') revealAll();
});

/* 스와이프 */
let tx = 0, ty = 0;
main.addEventListener('touchstart', e => { tx = e.touches[0].clientX; ty = e.touches[0].clientY; }, {passive:true});
main.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx, dy = e.changedTouches[0].clientY - ty;
  if(Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.6){ dx < 0 ? next() : prev(); }
}, {passive:true});

/* ── 설정 시트 ── */
const sheet = $('sheet');
const cats = [...new Set(CARDS.map(c => c.cat))];
$('catOpts').innerHTML = [`<button class="opt" data-v="all">전체</button>`]
  .concat(cats.map(c => `<button class="opt" data-v="${c}">${c}</button>`)).join('');

function syncOpts(){
  document.querySelectorAll('.opts').forEach(g => {
    const k = g.dataset.k; if(!k) return;
    g.querySelectorAll('.opt').forEach(o => o.classList.toggle('sel', String(store.cfg[k]) === o.dataset.v));
  });
  $('q').value = store.cfg.q || '';
  $('spd').value = store.cfg.spd;
  $('spdV').textContent = (store.cfg.spd / 10).toFixed(1);
}
document.querySelectorAll('.opts').forEach(g => {
  if(!g.dataset.k) return;                       // 빠른 시작(프리셋) 그룹은 제외
  g.addEventListener('click', e => {
    const o = e.target.closest('.opt'); if(!o) return;
    store.cfg[g.dataset.k] = o.dataset.v; syncOpts();
  });
});
$('spd').oninput = e => { store.cfg.spd = +e.target.value; $('spdV').textContent = (store.cfg.spd / 10).toFixed(1); };
$('p60').onclick = () => {
  Object.assign(store.cfg, {src:'all', star:'3', sort:'freq', mode:'blank', only:'all', cat:'all', q:'', full:'n'});
  $('q').value = ''; syncOpts();
};
$('pAll').onclick = () => {
  Object.assign(store.cfg, {src:'all', star:'1', sort:'book', mode:'step', only:'all', cat:'all', q:'', full:'y'});
  $('q').value = ''; syncOpts();
};
$('setBtn').onclick = () => { if(timer) toggleAuto(); syncOpts(); sheet.classList.add('open'); };
sheet.onclick = e => { if(e.target === sheet) closeSheet(); };
function closeSheet(){ sheet.classList.remove('open'); }
$('applyBtn').onclick = () => {
  store.cfg.q = $('q').value; store.idx = 0; save();
  closeSheet(); buildDeck(); render();
};
$('resetBtn').onclick = () => {
  if(!confirm('몰라/알아 표시와 진도를 모두 지울까요?')) return;
  store.mark = {}; store.seen = {}; store.idx = 0; save();
  closeSheet(); buildDeck(); render();
};

buildDeck(); syncOpts(); render();
</script>
</body>
</html>
